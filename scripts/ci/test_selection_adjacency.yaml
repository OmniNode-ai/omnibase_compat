---
# scripts/ci/test_selection_adjacency.yaml
# Static adjacency map from src/omnibase_compat/<module> to dependent modules.
# When a key module changes, every module in `reverse_deps` ALSO has its tests run.
# Treated as CI contract data — manually curated, reviewed in PRs that change it.

schema_version: 1

# `shared_modules` is a FULL-SUITE ESCALATION POLICY, not an architectural ontology.
# Listing a module here means "if this module changes, run the full suite".
# omnibase_compat is a thin shim — enums and primitives are the broadest foundations.
shared_modules:
  - enums
  - primitives
  - models

# Per-repo full-suite escalation thresholds.
# compat has fewer modules than core — lower threshold is appropriate.
thresholds:
  modules_changed_for_full_suite: 5

# Test infrastructure — any change forces the full suite.
test_infrastructure_paths:
  - src/omnibase_compat/tests/conftest.py
  - pytest.ini
  - pyproject.toml

# Reverse dependency edges. Key = changed module; value = modules that import it.
# omnibase_compat is a thin structural shim — most modules are leaves with no
# reverse deps. Shared foundation modules (enums, primitives, models) escalate
# to full suite via shared_modules above, not via adjacency expansion.
adjacency:
  # Shared foundation — listed in shared_modules, full-suite escalation applies
  enums:
    reverse_deps: [models, types, contracts, protocols, routing, registration]
  primitives:
    reverse_deps: [models, contracts, types]
  models:
    reverse_deps: [contracts, protocols, adapters, routing, overseer, telemetry]
  # Mid-level — depend on foundation, depended on by few
  contracts:
    reverse_deps: [adapters, registration]
  protocols:
    reverse_deps: [adapters, routing]
  types:
    reverse_deps: [models, contracts]
  # Leaf modules — no or minimal reverse deps
  adapters:
    reverse_deps: []
  concurrency:
    reverse_deps: []
  env:
    reverse_deps: []
  experimental:
    reverse_deps: []
  metadata:
    reverse_deps: []
  overseer:
    reverse_deps: []
  registration:
    reverse_deps: []
  routing:
    reverse_deps: []
  telemetry:
    reverse_deps: []
  tooling:
    reverse_deps: []
  utils:
    reverse_deps: []
