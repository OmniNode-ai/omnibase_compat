name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC nightly

env:
  UV_VERSION: "0.8.3"
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --dev --frozen
      - run: uv run python scripts/validate_no_upstream_deps.py
      - run: uv run python scripts/check_compat_retention.py
      - run: uv run ruff check src/
      - run: uv run mypy src/omnibase_compat --strict
      - run: uv build
      - run: uv pip install dist/*.whl

  # ---------------------------------------------------------------------------
  # Detect Changes — OMN-10761 smart test selection
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - run: uv sync --dev --frozen

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          uv run python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(jq -r '.is_full_suite' selection.json)
          reason=$(jq -r '.full_suite_reason // ""' selection.json)
          split_count=$(jq -r '.split_count' selection.json)
          matrix=$(jq -c '.matrix' selection.json)
          paths=$(jq -c '.selected_paths' selection.json)
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Upload selection artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-selection
          path: selection.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Tests — matrix driven by detect-changes
  # ---------------------------------------------------------------------------
  test-parallel:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [validate, detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - run: uv sync --dev --frozen

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | jq -r '.[]')
          uv run pytest $paths \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        run: |
          uv run pytest src/omnibase_compat/tests/ \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            --tb=short \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  tests-gate:
    name: Tests Gate
    needs: test-parallel
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate test results
        run: |
          result="${{ needs.test-parallel.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "Tests Gate: PASSED ($result)"
            exit 0
          else
            echo "Tests Gate: FAILED ($result)"
            exit 1
          fi

  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Clone onex_change_control
        run: git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Resolve PR number
        id: pr_number
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            # merge_group: ref is gh-readonly-queue/main/pr-<num>-<sha>
            PR=$(echo "${{ github.ref }}" | grep -oP '(?<=pr-)\d+')
            echo "pr=$PR" >> "$GITHUB_OUTPUT"
          fi
      - name: Run contract compliance check
        if: steps.pr_number.outputs.pr != ''
        run: |
          python /tmp/onex_change_control/scripts/ci/run_contract_compliance_check.py \
            --pr ${{ steps.pr_number.outputs.pr }} \
            --repo ${{ github.repository }} \
            --contracts-dir /tmp/onex_change_control/contracts
        env:
          EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, tests-gate, contract-compliance]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
