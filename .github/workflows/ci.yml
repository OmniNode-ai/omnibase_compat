name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev --frozen
      - run: uv run python scripts/validate_no_upstream_deps.py
      - run: uv run python scripts/check_compat_retention.py
      - run: uv run ruff check src/
      - run: uv run mypy src/omnibase_compat --strict
      - run: uv run pytest src/omnibase_compat/tests/ -m unit --tb=short
      - run: uv build
      - run: uv pip install dist/*.whl


  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - name: Clone onex_change_control
        run: git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run contract compliance check
        run: |
          python /tmp/onex_change_control/scripts/ci/run_contract_compliance_check.py \
            --pr ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --contracts-dir /tmp/onex_change_control/contracts
        env:
          EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, contract-compliance]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
