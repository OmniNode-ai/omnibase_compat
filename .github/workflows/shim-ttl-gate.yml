# shim-ttl-gate.yml
#
# CI gate: fail if any forward-compat shim has a past-TTL sunset annotation.
# Implements OMN-8820.

name: Shim TTL Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  shim-ttl-gate:
    name: Shim TTL Gate
    runs-on: >-
      ${{
        vars.USE_SELF_HOSTED_RUNNERS == 'true'
        && 'self-hosted, omnibase-ci'
        || 'ubuntu-latest'
      }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.21"

      - name: Install package
        run: uv sync --dev

      - name: Check shim TTLs
        run: uv run python -m omnibase_compat.tooling.shim_ttl_check src/
